{% extends "accounts/base.html" %}
{% block title %}Registrar-se |{% endblock title %}
{% block content %}
    <main class="main-content">
    <header class="login-header">
        <h1>Cadastro</h1>
    </header>

    <div class="name-row">
        <div class="form-group">
            <div class="input-content">
                <input type="text" id="nome" placeholder=" " required>
                <label for="nome">Nome</label>
                <i class="fa-solid fa-user"></i>
            </div>
        </div>

        <div class="form-group">
            <div class="input-content">
                <input type="text" id="sobrenome" placeholder=" " required>
                <label for="sobrenome">Sobrenome</label>
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </div>

    <div class="form-group">
        <div class="input-content">
            <input type="text" id="celular" placeholder=" " required>
            <label for="celular">Celular</label>
            <i class="fa-solid fa-phone"></i>
        </div>
    </div>

    <div class="form-group">
        <div class="input-content">
            <input type="password" id="senha" placeholder=" " required>
            <label for="senha">Senha</label>
            <i class="fa-solid fa-lock"></i>
        </div>
    </div>

    <div class="form-group">
        <div class="input-content">
            <input type="password" id="confirmar-senha" placeholder=" " required>
            <label for="confirmar-senha">Confirmar senha</label>
            <i class="fa-solid fa-lock"></i>
        </div>
    </div>

    <div class="button-content">
        <button type="button">Registrar</button>
    </div>

    <footer class="login-footer">
        <p>Já tem conta? <a href="{% url "accounts:login" %}">Faça login aqui</a></p>
    </footer>
</main>
{% endblock content %}
